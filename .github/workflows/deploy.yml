name: Deploy to AWS EC2

# main 브랜치에 push되면 실행
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. EC2에 SSH 접속해서 배포
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/fdx-backend
            
            # 최신 코드 받기
            git pull origin main
            
            # 기존 컨테이너 중지 & 삭제
            docker stop fdx-backend || true
            docker rm fdx-backend || true
            
            # 새 이미지 빌드
            docker build -t fdx-backend .
            
            # 새 컨테이너 실행
            docker run -d \
              --name fdx-backend \
              -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e DB_HOST=fdx-database.cnug66ygqiul.ap-southeast-2.rds.amazonaws.com \
              -e DB_PORT=3306 \
              -e DB_NAME=fdxdb \
              -e DB_USERNAME=admin \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e SWAGGER_ENABLED=true \
              -e GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
              -e GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }} \
              --restart unless-stopped \
              fdx-backend
            
            # 정리: 사용하지 않는 이미지 삭제
            docker image prune -f